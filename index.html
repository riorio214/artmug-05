<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Flea Market Portfolio</title>
<style>
/* ── 폰트 ── */
@font-face { font-family: 'Paperlogy'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
@font-face { font-family: 'Paperlogy'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
@font-face { font-family: 'Paperlogy'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2'); font-weight: 800; font-display: swap; }

:root {
  --market-pink: #ff99bb;    /* 어닝 포인트 핑크 */
  --market-wood: #fff0f5;    /* 부드러운 나무/배경 색상 */
  --tag-red: #ff5252;        /* 할인/포인트 레드 */
  --text-brown: #5d4037;     /* 따뜻한 브라운 텍스트 */
  --border-pink: #ffcad4;
}

body {
  font-family: 'Paperlogy', sans-serif;
  background: #fffafa;
  color: var(--text-brown);
  padding: 40px 15px;
  line-height: 1.6;
}
.container { max-width: 800px; margin: 0 auto; }

/* ── 마켓 상단 (어닝/천막 디자인) ── */
.market-awning {
  height: 60px;
  background: linear-gradient(90deg, 
    var(--market-pink) 0%, var(--market-pink) 50%, 
    #ffffff 50%, #ffffff 100%);
  background-size: 80px 100%;
  border: 4px solid var(--market-pink);
  border-bottom: none;
  border-radius: 20px 20px 0 0;
  position: relative;
}
.market-awning::after {
  content: '';
  position: absolute;
  bottom: -15px; left: -4px; right: -4px;
  height: 20px;
  background-image: radial-gradient(circle at 10px 0, var(--market-pink) 15px, transparent 16px);
  background-size: 40px 20px;
  z-index: 2;
}

/* ── 메인 가판대 영역 ── */
.market-stall {
  background: #ffffff;
  border: 4px solid var(--market-pink);
  border-radius: 0 0 20px 20px;
  padding: 50px 30px 30px;
  box-shadow: 0 10px 0 var(--border-pink);
  position: relative;
}

section { margin-bottom: 50px; position: relative; }

/* ── 섹션 타이틀 (칠판 느낌) ── */
.section-title {
  display: inline-block;
  background: var(--text-brown);
  color: #fff;
  padding: 4px 15px;
  border-radius: 5px;
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 25px;
  box-shadow: 2px 2px 0 var(--border-pink);
}

/* ── 프로필: 상점 간판 ── */
.shop-sign {
  text-align: center;
  border: 2px solid var(--border-pink);
  padding: 20px;
  border-radius: 15px;
  background: var(--market-wood);
  margin-bottom: 40px;
}
.shop-name { font-size: 26px; font-weight: 800; color: var(--market-pink); margin-bottom: 5px; }

/* ── 포트폴리오: 진열대 상품 ── */
.pf-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}
.pf-item {
  background: #fff;
  border: 1px solid var(--border-pink);
  padding: 10px;
  border-radius: 5px;
  box-shadow: 3px 3px 0 var(--border-pink);
  transition: 0.2s;
  cursor: pointer;
}
.pf-item:hover { transform: rotate(-2deg) translateY(-5px); }
.pf-thumb {
  width: 100%; aspect-ratio: 1;
  background: #eee; border-radius: 3px; overflow: hidden;
  margin-bottom: 8px;
}
.pf-thumb img { width: 100%; height: 100%; object-fit: cover; }
.pf-price-tag {
  font-size: 11px; font-weight: 800; color: var(--tag-red);
  text-align: right; border-top: 1px dashed var(--border-pink);
  padding-top: 5px;
}

/* ── 가격 안내: 수기 메뉴판 ── */
.menu-list {
  list-style: none; padding: 0;
}
.menu-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid var(--border-pink);
}
.menu-name { font-weight: 700; font-size: 15px; }
.menu-price { 
  background: var(--tag-red); color: #fff; 
  padding: 2px 10px; border-radius: 3px; font-weight: 800;
  transform: rotate(2deg);
}

/* ── 문의 양식: 포장 주문서 ── */
.order-sheet {
  background: #fff9fa;
  border: 2px solid var(--border-pink);
  padding: 25px;
  border-radius: 10px;
}
.input-label { font-size: 12px; font-weight: 800; color: var(--market-pink); margin-bottom: 5px; display: block; }
.market-input {
  width: 100%; border: none; border-bottom: 2px solid var(--border-pink);
  background: transparent; padding: 10px 5px; margin-bottom: 20px;
  font-family: 'Paperlogy'; font-size: 14px; outline: none;
}
.market-input:focus { border-bottom-color: var(--market-pink); }

.checkout-btn {
  width: 100%; background: var(--market-pink); color: #fff;
  border: none; padding: 18px; border-radius: 10px;
  font-size: 18px; font-weight: 800; cursor: pointer;
  box-shadow: 0 5px 0 var(--market-dark); transition: 0.1s;
}
.checkout-btn:active { transform: translateY(3px); box-shadow: none; }

@media (max-width: 600px) {
  .pf-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="container">
  <div class="market-awning"></div>

  <div class="market-stall">
    
    <div class="shop-sign">
      <div class="shop-name">🌸 핑크-픽 마켓 🌸</div>
      <p style="font-size: 13px; color: var(--text-brown);">정성을 담은 따뜻한 그림을 판매합니다</p>
    </div>

    <section>
      <div class="section-title">NOTICE</div>
      <ul style="font-size: 13px; padding-left: 20px;">
        <li>모든 작업물의 저작권은 작가에게 있습니다.</li>
        <li>작업물은 포트폴리오로 사용될 수 있습니다.</li>
        <li>슬롯제로 운영되니 신청 전 문의 부탁드려요!</li>
      </ul>
    </section>

    <section>
      <div class="section-title">MENU / PRICE</div>
      <div class="menu-list">
        <div class="menu-item">
          <span class="menu-name">🍓 딸기 타입 (두상/단색)</span>
          <span class="menu-price">₩ 20,000</span>
        </div>
        <div class="menu-item">
          <span class="menu-name">🍑 복숭아 타입 (전신/채색)</span>
          <span class="menu-price">₩ 50,000</span>
        </div>
      </div>
    </section>

    <section>
      <div class="section-title">ITEMS ON SALE</div>
      <div class="pf-grid" id="pfGrid">
        <div class="pf-item">
          <div class="pf-thumb"><img src="https://via.placeholder.com/300"></div>
          <div class="pf-price-tag">SOLD OUT</div>
        </div>
        <div class="pf-item">
          <div class="pf-thumb"><img src="https://via.placeholder.com/300"></div>
          <div class="pf-price-tag">ITEM 02</div>
        </div>
        <div class="pf-item">
          <div class="pf-thumb"><img src="https://via.placeholder.com/300"></div>
          <div class="pf-price-tag">ITEM 03</div>
        </div>
      </div>
    </section>

    <section>
      <div class="section-title">ORDER SHEET</div>
      <div class="order-sheet">
        <label class="input-label">BUYER NAME (의뢰인 닉네임)</label>
        <input type="text" class="market-input" id="fm_nick" placeholder="성함을 적어주세요">

        <label class="input-label">ITEM SELECT (선택 타입)</label>
        <input type="text" class="market-input" id="fm_type" placeholder="예: 복숭아 타입">

        <label class="input-label">SPECIAL REQUEST (요청 사항)</label>
        <textarea class="market-input" id="fm_concept" rows="3" placeholder="원하시는 느낌을 자유롭게 적어주세요"></textarea>

        <button class="checkout-btn" onclick="copyForm()">🛒 주문서 복사하기</button>
      </div>
    </section>

  </div> </div> <script>
// 기존 자바스크립트 로직(renderPf, copyForm 등)을 그대로 사용하세요!
</script>

</body>
</html>
